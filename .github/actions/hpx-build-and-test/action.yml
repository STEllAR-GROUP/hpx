name: "HPX Build and Test"
description: "Download build artifacts, build selected targets, run tests, and upload artifacts"

inputs:
  build-artifact-name:
    description: "Name of the downloaded build artifact archive"
    required: true
  build-targets:
    description: "Whitespace-separated ninja targets to build"
    required: false
    default: ""
  build-target:
    description: "Single ninja target to build"
    required: false
    default: ""
  target-file:
    description: "File containing ninja targets and, optionally, ctest targets"
    required: false
    default: ""
  build-jobs:
    description: "Parallelism for ninja, empty means use nproc"
    required: false
    default: ""
  run-tests:
    description: "Whether to execute ctest"
    required: false
    default: "true"
  ctest-timeout:
    description: "CTest timeout in seconds"
    required: false
    default: "180"
  ctest-jobs:
    description: "Parallelism for ctest, empty means use nproc"
    required: false
    default: ""
  ctest-regex:
    description: "Explicit ctest regex, takes precedence over target-file derived regex"
    required: false
    default: ""
  ctest-exclude-regex:
    description: "Optional ctest exclude regex"
    required: false
    default: ""
  ctest-regex-transform:
    description: "Optional regex transform for target-file derived tests"
    required: false
    default: ""
  artifact-job-name:
    description: "Artifact directory name"
    required: true
  upload-artifacts:
    description: "Whether to collect and upload test artifacts"
    required: false
    default: "true"
  collect-failure-artifacts:
    description: "Collect core dumps and debug logs on failure"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.build-artifact-name }}

    - name: Extract build artifacts
      shell: bash
      run: tar -xzf build.tar.gz

    - name: Build selected targets
      if: inputs.build-targets != '' || inputs.build-target != '' || inputs.target-file != ''
      shell: bash
      working-directory: build
      run: |
        set -euo pipefail

        declare -a targets=()

        if [ -n "${{ inputs.build-targets }}" ]; then
          # The dynamic matrix generated by ctest -N already provides the exact
          # set of ninja targets for this shard.
          IFS=' ' read -r -a targets <<< "${{ inputs.build-targets }}"
        elif [ -n "${{ inputs.target-file }}" ]; then
          mapfile -t targets < <(grep -v -e '^#' -e '^$' "$GITHUB_WORKSPACE/${{ inputs.target-file }}")
        elif [ -n "${{ inputs.build-target }}" ]; then
          targets=("${{ inputs.build-target }}")
        fi

        if [ "${#targets[@]}" -eq 0 ]; then
          echo "No targets selected for build"
          exit 0
        fi

        jobs="${{ inputs.build-jobs }}"
        if [ -z "$jobs" ]; then
          jobs="$(nproc)"
        fi

        ninja -j"$jobs" -k 0 "${targets[@]}"

    - name: Run ctest
      if: inputs.run-tests == 'true'
      shell: bash
      working-directory: build
      run: |
        set -euo pipefail

        regex="${{ inputs.ctest-regex }}"

        if [ -z "$regex" ] && [ -n "${{ inputs.target-file }}" ]; then
          regex_source="$(grep -v -e '^#' -e '^$' "$GITHUB_WORKSPACE/${{ inputs.target-file }}")"

          case "${{ inputs.ctest-regex-transform }}" in
            segmented_algorithms)
              regex_source="$(printf '%s\n' "$regex_source" | sed 's/tests\.unit\.modules\.segmented_algorithms\./tests.unit.modules.segmented_algorithms.distributed.tcp./g')"
              ;;
            "")
              ;;
            *)
              echo "Unsupported ctest regex transform: ${{ inputs.ctest-regex-transform }}"
              exit 1
              ;;
          esac

          regex="$(printf '%s\n' "$regex_source" | sed ':b;N;$!bb;s/\n/|/g')"
        fi

        if [ -z "$regex" ]; then
          echo "No ctest regex specified"
          exit 1
        fi

        declare -a ctest_args=(
          --timeout "${{ inputs.ctest-timeout }}"
          -T test
          --no-compress-output
          --output-on-failure
        )

        jobs="${{ inputs.ctest-jobs }}"
        if [ -z "$jobs" ]; then
          jobs="$(nproc)"
        fi
        ctest_args+=(-j "$jobs")

        ctest_args+=(--tests-regex "$regex")

        if [ -n "${{ inputs.ctest-exclude-regex }}" ]; then
          ctest_args+=(--exclude-regex "${{ inputs.ctest-exclude-regex }}")
        fi

        ulimit -c unlimited
        ctest "${ctest_args[@]}"

    - name: Collect test artifacts
      if: always() && inputs.upload-artifacts == 'true' && inputs.run-tests == 'true'
      uses: ./.github/actions/collect-artifacts
      with:
        job-name: ${{ inputs.artifact-job-name }}
        collect-failure-artifacts: ${{ inputs.collect-failure-artifacts }}

    - name: Upload test artifacts
      if: always() && inputs.upload-artifacts == 'true' && inputs.run-tests == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-job-name }}-artifacts
        path: build/${{ inputs.artifact-job-name }}/
