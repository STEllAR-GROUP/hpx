name: Run_on_all Feature Test

on:
  push:
    branches: [ run_on_all_exec_policy ]
  pull_request:
    branches: [ run_on_all_exec_policy ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: stellargroup/build_env:14

    steps:
    - uses: actions/checkout@v4
    - name: Configure
      shell: bash
      run: |
          cmake \
              . \
              -Bbuild \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Debug \
              -DHPX_WITH_MALLOC=system \
              -DHPX_WITH_FETCH_ASIO=ON \
              -DHPX_WITH_EXAMPLES=OFF \
              -DHPX_WITH_TESTS=ON \
              -DHPX_WITH_TESTS_MAX_THREADS_PER_LOCALITY=2 \
              -DHPX_WITH_TESTS_UNIT=ON \
              -DHPX_WITH_TESTS_REGRESSIONS=OFF \
              -DHPX_WITH_TESTS_BENCHMARKS=OFF \
              -DHPX_WITH_TESTS_EXAMPLES=OFF \
              -DHPX_WITH_TESTS_HEADERS=OFF \
              -DHPX_WITH_TESTS_UNIT_DISTRIBUTED=OFF
    - name: Build Only Run-on-all Test
      shell: bash
      run: |
          cmake --build build --target run_on_all_exec_policy_test
    - name: Test
      shell: bash
      run: |
          cd build
          # Run the test directly without CTest to avoid trying to run other tests
          ./bin/run_on_all_exec_policy_test
    - name: Run inspect
      shell: bash
      run: |
          cd build
          ninja -j2 tools.inspect
          ./bin/inspect --all --output=./hpx_inspect_report.html ..
    - name: Modify CTestTestfile.cmake
      if: ${{ always() }}
      shell: bash
      run: |
          cd build
          # Create a modified version of CTestTestfile.cmake that only includes our test
          CTEST_FILE=$(find . -name "CTestTestfile.cmake" | xargs grep -l "run_on_all_exec_policy_test" | head -1)
          if [ -n "$CTEST_FILE" ]; then
            echo "Found CTestTestfile.cmake: $CTEST_FILE"
            # Create a backup
            cp "$CTEST_FILE" "${CTEST_FILE}.bak"
            # Extract the single test we want
            grep "run_on_all_exec_policy_test" "$CTEST_FILE" > "${CTEST_FILE}.single"
            # Create a new file with the proper structure
            echo 'if(NOT "${CMAKE_CURRENT_LIST_DIR}" STREQUAL "")' > "$CTEST_FILE"
            echo '  set(CMAKE_CURRENT_LIST_DIR "/hpx/build")' >> "$CTEST_FILE"
            echo 'endif()' >> "$CTEST_FILE"
            echo 'include("/hpx/build/CTestTestfile.cmake.single")' >> "$CTEST_FILE"
            echo "Modified CTestTestfile.cmake to only run our test"
          else
            echo "Could not find CTestTestfile.cmake containing our test"
          fi 